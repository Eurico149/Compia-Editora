services:

  api:
    container_name: api_compia
    build: ./backend
    restart: unless-stopped

  front:
    container_name: front_compia
    build: ./frontend
    restart: unless-stopped

  nginx:
    container_name: compia_nginx
    image: nginx:stable
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - front
      - api

  mongo:
    container_name: compia_mongo
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${COMPIA_MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${COMPIA_MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: 
