services:

  api:
    container_name: api_compia
    build: ./backend
    restart: no
    environment:
      COMPIA_MONGO_URI: ${COMPIA_MONGO_URI}
      COMPIA_MONGO_DB: ${COMPIA_MONGO_DB}
      COMPIA_ADM_UID: ${COMPIA_ADM_UID}
      MELHOR_ENVIO_CEP_BASE: ${MELHOR_ENVIO_CEP_BASE}
      MELHOR_ENVIO_API_KEY: ${MELHOR_ENVIO_API_KEY}
      COMPIA_SMTP_PASS: ${COMPIA_SMTP_PASS}
      COMPIA_MAIL_USERNAME: ${COMPIA_MAIL_USERNAME}
      COMPIA_MAIL_FROM: ${COMPIA_MAIL_FROM}
      COMPIA_FIREBASE_TYPE: ${COMPIA_FIREBASE_TYPE}
      COMPIA_FIREBASE_PROJECT_ID: ${COMPIA_FIREBASE_PROJECT_ID}
      COMPIA_FIREBASE_PRIVATE_KEY_ID: ${COMPIA_FIREBASE_PRIVATE_KEY_ID}
      COMPIA_FIREBASE_PRIVATE_KEY: ${COMPIA_FIREBASE_PRIVATE_KEY}
      COMPIA_FIREBASE_CLIENT_EMAIL: ${COMPIA_FIREBASE_CLIENT_EMAIL}
      COMPIA_FIREBASE_CLIENT_ID: ${COMPIA_FIREBASE_CLIENT_ID}
      COMPIA_FIREBASE_AUTH_URI: ${COMPIA_FIREBASE_AUTH_URI}
      COMPIA_FIREBASE_TOKEN_URI: ${COMPIA_FIREBASE_TOKEN_URI}
      COMPIA_FIREBASE_AUTH_PROVIDER_X509_CERT_URL: ${COMPIA_FIREBASE_AUTH_PROVIDER_X509_CERT_URL}
      COMPIA_FIREBASE_CLIENT_X509_CERT_URL: ${COMPIA_FIREBASE_CLIENT_X509_CERT_URL}
      COMPIA_FIREBASE_UNIVERSE_DOMAIN: ${COMPIA_FIREBASE_UNIVERSE_DOMAIN}
    depends_on:
      - mongo

  front:
    container_name: compia_front
    build:
      context: ./frontend
      args:
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
        - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
        - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
        - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
        - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
        - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
        - VITE_FIREBASE_MEASUREMENT_ID=${VITE_FIREBASE_MEASUREMENT_ID}
    restart: no
    volumes:
      - front_static:/web_files

  nginx:
    container_name: compia_nginx
    image: nginx:stable
    restart: no
    ports:
      - "8080:80"
    volumes:
      - nginx_log:/var/log/nginx
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - front_static:/web_files
    depends_on:
      - api

  mongo:
    container_name: compia_mongo
    image: mongo:7.0
    restart: no
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${COMPIA_MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${COMPIA_MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db

  mongo-express:
    container_name: compia_mongo_express
    image: mongo-express
    restart: no
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${COMPIA_MONGO_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${COMPIA_MONGO_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo
    depends_on:
      - mongo

volumes:
  mongo_data: 
  nginx_log:
  front_static:
